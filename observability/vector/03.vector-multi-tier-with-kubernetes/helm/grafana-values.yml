adminUser:     admin
adminPassword: admin

service:
  type:     NodePort
  nodePort: 30000

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name:      Loki
        type:      loki
        url:       http://loki.logging.svc.cluster.local:3100
        isDefault: true
        editable:  false
        jsonData:
          maxLines: 5000

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name:    multi-tier
        orgId:   1
        folder:  Multi-tier Logs
        type:    file
        options:
          path: /var/lib/grafana/dashboards/multi-tier

dashboards:
  multi-tier:
    overview:
      json: |
        {
          "title": "Multi-tier Logs",
          "uid": "multitier",
          "schemaVersion": 38,
          "refresh": "30s",
          "time": { "from": "now-1h", "to": "now" },
          "panels": [
            {
              "id": 1, "type": "logs", "title": "All Logs",
              "gridPos": { "x": 0, "y": 0, "w": 24, "h": 10 },
              "datasource": { "type": "loki" },
              "targets": [{ "expr": "{namespace=~\".+\"}", "refId": "A" }],
              "options": { "showTime": true, "showLabels": true, "sortOrder": "Descending" }
            },
            {
              "id": 2, "type": "timeseries", "title": "Log Rate by Namespace",
              "gridPos": { "x": 0, "y": 10, "w": 12, "h": 8 },
              "datasource": { "type": "loki" },
              "targets": [{ "expr": "sum by (namespace) (rate({namespace=~\".+\"}[2m]))", "refId": "A", "legendFormat": "{{namespace}}" }]
            },
            {
              "id": 3, "type": "timeseries", "title": "Error Rate",
              "gridPos": { "x": 12, "y": 10, "w": 12, "h": 8 },
              "datasource": { "type": "loki" },
              "targets": [{ "expr": "sum by (service) (rate({level=\"error\"}[2m]))", "refId": "A", "legendFormat": "{{service}}" }]
            }
          ]
        }

persistence:
  enabled: true
  size:    2Gi

resources:
  requests: { cpu: 100m, memory: 128Mi }
  limits:   { cpu: 200m, memory: 256Mi }
