kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: vector-metrics

nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30000   # Grafana
        hostPort: 3002
        protocol: TCP
      - containerPort: 30428   # VictoriaMetrics
        hostPort: 8428
        protocol: TCP
      - containerPort: 30100   # Loki
        hostPort: 3103
        protocol: TCP
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"

  - role: worker
  - role: worker

networking:
  podSubnet:     "10.246.0.0/16"
  serviceSubnet: "10.98.0.0/12"
