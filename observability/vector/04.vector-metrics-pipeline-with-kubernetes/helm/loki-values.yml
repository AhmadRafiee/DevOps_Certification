deploymentMode: SingleBinary

loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1

  storage:
    type: filesystem

  schemaConfig:
    configs:
      - from: "2024-01-01"
        store:        tsdb
        object_store: filesystem
        schema:       v13
        index:
          prefix: index_
          period: 24h

  limits_config:
    allow_structured_metadata: true
    reject_old_samples:         true
    reject_old_samples_max_age: 168h

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    size:    5Gi

read:    { replicas: 0 }
write:   { replicas: 0 }
backend: { replicas: 0 }
minio:   { enabled: false }
gateway: { enabled: false }
